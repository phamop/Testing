name: multiline shell
on: workflow_dispatch
jobs:
  shell-job:
    runs-on: ubuntu-latest
    steps:
      - name: Run multi-line script
        run: |
          echo "Starting job..."
          echo "Current directory: $(pwd)"
          echo "Running as user: $(whoami)"
          for i in 1 2 3; do
            echo "Loop iteration $i"
          done
          echo "Done."
